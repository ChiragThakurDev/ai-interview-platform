services:

  backend:
    build:
      context: .

    container_name: ai-interview-api

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:8000"

    volumes:
      - ./uploads:/app/uploads

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  postgres:
    image: postgres:16

    container_name: ai-interview-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_interview_platform

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_interview_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7

    container_name: ai-interview-redis

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "6379:6379"


volumes:
  postgres_data:
