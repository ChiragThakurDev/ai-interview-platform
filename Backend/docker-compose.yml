services:

  backend:
    image: ai-interview-backend
    container_name: ai-interview-api

    env_file:
      - .env

    ports:
      - "5000:8000"

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy


  postgres:
    image: postgres:16
    container_name: ai-interview-postgres

    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_interview_platform

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_interview_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: ai-interview-redis

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "6379:6379"


volumes:

  postgres_data:

